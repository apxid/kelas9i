<div class="p-5 fade-in pb-20">

    <h4 class="text-base font-black text-slate-800 tracking-tight">Pusat Rekam Jejak & Akademik</h4>
    <p class="text-[11px] text-gray-400">Pilih sub-kategori informasi di bawah untuk monitoring.</p>
  </div>

  <!-- Wrapper Navigasi -->
  <div class="relative group mb-4">
    <!-- Panah Kiri -->
    <button onclick="scrollMenu('left')" class="absolute left-0 top-1/2 -translate-y-1/2 z-10 bg-white/90 shadow-lg p-1.5 rounded-full hidden md:flex border border-gray-100 hover:bg-slate-100">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
    </button>

    <!-- List Menu -->
    <div id="scroll-container" class="flex space-x-2 overflow-x-auto pb-3 scrollbar-hide select-none px-6 md:px-0">
      <button onclick="switchSubMenu('prestasi')" id="subbtn-prestasi" class="sub-tab-item active bg-white text-slate-700 px-4 py-2 rounded-xl text-xs font-bold border border-gray-100 shadow-sm whitespace-nowrap">🏆 Prestasi</button>
      <button onclick="switchSubMenu('informasi')" id="subbtn-informasi" class="sub-tab-item bg-white text-slate-700 px-4 py-2 rounded-xl text-xs font-bold border border-gray-100 shadow-sm whitespace-nowrap">📢 Pengumuman</button>
      <button onclick="switchSubMenu('pelanggaran')" id="subbtn-pelanggaran" class="sub-tab-item bg-white text-slate-700 px-4 py-2 rounded-xl text-xs font-bold border border-gray-100 shadow-sm whitespace-nowrap">🚨 Pelanggaran</button>
      <button onclick="switchSubMenu('jadwal')" id="subbtn-jadwal" class="sub-tab-item bg-white text-slate-700 px-4 py-2 rounded-xl text-xs font-bold border border-gray-100 shadow-sm whitespace-nowrap">📅 Jadwal Kelas</button>
      <!-- Menu Baru -->
      <button onclick="switchSubMenu('jadwal-piket')" id="subbtn-jadwal-piket" class="sub-tab-item bg-white text-slate-700 px-4 py-2 rounded-xl text-xs font-bold border border-gray-100 shadow-sm whitespace-nowrap">🧹 Jadwal Piket</button>
    </div>

    <!-- Panah Kanan -->
    <button onclick="scrollMenu('right')" class="absolute right-0 top-1/2 -translate-y-1/2 z-10 bg-white/90 shadow-lg p-1.5 rounded-full hidden md:flex border border-gray-100 hover:bg-slate-100">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
    </button>
  </div>

  <div id="sub-menu-content-container" class="space-y-3">
    <div class="shimmer h-24 rounded-2xl w-full"></div>
  </div>
</div>
