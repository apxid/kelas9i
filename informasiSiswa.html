<div class="p-5 fade-in pb-20 relative">
  <div class="mb-4">
    <h4 class="text-base font-black text-slate-800 tracking-tight">Pusat Rekam Jejak & Akademik</h4>
    <p class="text-[11px] text-gray-400">Pilih sub-kategori informasi di bawah untuk monitoring.</p>
  </div>

  <div class="relative group">
    <button onclick="scrollMenu(-200)" class="absolute -left-3 top-1/2 -translate-y-1/2 bg-white p-2 rounded-full shadow-lg border border-gray-100 z-10 hidden md:block hover:bg-gray-50 transition-all">◀</button>
    
    <div id="menu-scroll-container" class="flex space-x-2 overflow-x-auto pb-3 mb-4 scrollbar-hide select-none scroll-smooth">
      <button onclick="switchSubMenu('PRESTASI')" id="subbtn-PRESTASI" class="sub-tab-item active bg-white text-slate-700 px-4 py-2 rounded-xl text-xs font-bold border border-gray-100 shadow-sm whitespace-nowrap">🏆 Prestasi</button>
      <button onclick="switchSubMenu('PENGUMUMAN')" id="subbtn-PENGUMUMAN" class="sub-tab-item bg-white text-slate-700 px-4 py-2 rounded-xl text-xs font-bold border border-gray-100 shadow-sm whitespace-nowrap">📢 Pengumuman</button>
      <button onclick="switchSubMenu('PELANGGARAN')" id="subbtn-PELANGGARAN" class="sub-tab-item bg-white text-slate-700 px-4 py-2 rounded-xl text-xs font-bold border border-gray-100 shadow-sm whitespace-nowrap">🚨 Pelanggaran</button>
      <button onclick="switchSubMenu('JADWAL_KELAS')" id="subbtn-JADWAL_KELAS" class="sub-tab-item bg-white text-slate-700 px-4 py-2 rounded-xl text-xs font-bold border border-gray-100 shadow-sm whitespace-nowrap">📅 Jadwal Kelas</button>
      <button onclick="switchSubMenu('JADWAL_PIKET')" id="subbtn-JADWAL_PIKET" class="sub-tab-item bg-white text-slate-700 px-4 py-2 rounded-xl text-xs font-bold border border-gray-100 shadow-sm whitespace-nowrap">🧹 Jadwal Piket</button>
    </div>

    <button onclick="scrollMenu(200)" class="absolute -right-3 top-1/2 -translate-y-1/2 bg-white p-2 rounded-full shadow-lg border border-gray-100 z-10 hidden md:block hover:bg-gray-50 transition-all">▶</button>
  </div>

  <div id="sub-menu-content-container" class="space-y-3">
    <div class="shimmer h-24 rounded-2xl w-full"></div>
  </div>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyK6wmxSpZ3tEG0Rar3BlGjp7z-3ZPhTB6NvdmNkx8QlNKSoqafhsY0c1ZAcEMbPyW1VQ/exec";

  function scrollMenu(offset) {
    document.getElementById('menu-scroll-container').scrollBy({ left: offset, behavior: 'smooth' });
  }

  function switchSubMenu(sheetName) {
    // 1. Update status tombol
    document.querySelectorAll('.sub-tab-item').forEach(btn => btn.classList.remove('active'));
    document.getElementById('subbtn-' + sheetName).classList.add('active');
    
    // 2. Loading
    const container = document.getElementById('sub-menu-content-container');
    container.innerHTML = '<div class="text-xs text-center text-gray-400 py-4">Memuat data...</div>';

    // 3. Fetch Data dengan timestamp agar tidak ter-cache
    fetch(`${WEB_APP_URL}?action=getData&sheetName=${sheetName}&t=${new Date().getTime()}`)
      .then(response => response.json())
      .then(data => {
        if (!data || data.length === 0) {
          container.innerHTML = '<p class="text-xs text-gray-400 text-center py-4">Data tidak tersedia di sheet ' + sheetName + '.</p>';
          return;
        }

        let html = '<div class="grid gap-2">';
        data.forEach(item => {
          const vals = Object.values(item);
          // Mengambil nilai kolom pertama dan kedua dari sheet
          html += `
            <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
              <p class="text-xs font-black text-blue-600 uppercase tracking-wider">${vals[0] || '-'}</p>
              <p class="text-sm text-slate-700 mt-1">${vals[1] || '-'}</p>
            </div>`;
        });
        container.innerHTML = html + '</div>';
      })
      .catch(err => {
        console.error("Error Fetch:", err);
        container.innerHTML = '<p class="text-xs text-red-500 text-center py-4">Gagal memuat. Periksa koneksi atau Nama Sheet.</p>';
      });
  }

  // Panggil data pertama kali
  document.addEventListener("DOMContentLoaded", () => switchSubMenu('PRESTASI'));
</script>
