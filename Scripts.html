<script>
  // State manajemen aplikasi global
  let appState = {
    user: null,
    currentView: 'login'
  };

  // Inisialisasi awal aplikasi saat dokumen siap
  window.addEventListener('DOMContentLoaded', () => {
    runClock();
    setInterval(runClock, 60000);
    switchView('login');
  });

  function runClock() {
    const now = new Date();
    document.getElementById('app-clock').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }

  // Router SPA Engine
  function switchView(viewName) {
    if (!appState.user && viewName !== 'login') {
      switchView('login');
      return;
    }

    appState.currentView = viewName;
    const template = document.getElementById('view-' + viewName);
    if (!template) return;

    document.getElementById('active-view').innerHTML = template.innerHTML;
    
    // Manajemen visibilitas navigasi bawah
    const nav = document.getElementById('bottom-nav');
    if (viewName === 'login') {
      nav.classList.add('hidden');
    } else {
      nav.classList.remove('hidden');
      
      // Mengubah status kelas aktif pada ikon navigasi
      document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
      const targetBtn = document.querySelector(`button[onclick="switchView('${viewName}')"]`);
      if (targetBtn) targetBtn.classList.add('active');
    }

    // Lifecycle trigger pemuatan data fitur
    if (viewName === 'dashboard') loadDashboardData();
    if (viewName === 'biodata') loadBiodataData();
    if (viewName === 'prestasi') loadPrestasiData();
    if (viewName === 'konseling') loadKonselingData();
  }

  // Fungsi animasi Popup pengganti SweetAlert
  function showAlert(title, msg, type = 'success') {
    const overlay = document.getElementById('custom-alert');
    const card = document.getElementById('alert-card');
    const icon = document.getElementById('alert-icon');
    
    document.getElementById('alert-title').innerText = title;
    document.getElementById('alert-msg').innerText = msg;
    
    if (type === 'success') {
      icon.innerHTML = '<i class="fas fa-circle-check"></i>';
      icon.className = "w-16 h-16 mx-auto mb-4 flex items-center justify-center rounded-full text-2xl font-bold bg-emerald-50 text-emerald-500 animate-bounce";
    } else {
      icon.innerHTML = '<i class="fas fa-triangle-exclamation"></i>';
      icon.className = "w-16 h-16 mx-auto mb-4 flex items-center justify-center rounded-full text-2xl font-bold bg-rose-50 text-rose-500 animate-bounce";
    }

    overlay.classList.remove('opacity-0', 'pointer-events-none');
    card.classList.remove('scale-75');
    card.classList.add('scale-100');
  }

  function closeAlert() {
    const overlay = document.getElementById('custom-alert');
    const card = document.getElementById('alert-card');
    overlay.classList.add('opacity-0', 'pointer-events-none');
    card.classList.remove('scale-100');
    card.classList.add('scale-75');
  }

  function toggleElement(id) {
    const target = document.getElementById(id);
    if (target) target.classList.toggle('hidden');
  }

  // Protokol Komunikasi Client-Server (RPC Google)
  function handleLogin() {
    const nisn = document.getElementById('login-nisn').value.trim();
    const pwd = document.getElementById('login-pwd').value.trim();

    if (!nisn || !pwd) {
      showAlert('Gagal', 'Mohon isi semua kolom login.', 'error');
      return;
    }

    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          appState.user = { nisn: res.nisn, role: res.role };
          showAlert('Berhasil', 'Otentikasi berhasil, selamat datang!', 'success');
          setTimeout(() => switchView('dashboard'), 1000);
        } else {
          showAlert('Akses Ditolak', res.message, 'error');
        }
      })
      .withFailureHandler(err => showAlert('Sistem Error', err.message, 'error'))
      .loginUser(nisn, pwd);
  }

  function loadDashboardData() {
    document.getElementById('dash-username').innerText = "Siswa (" + appState.user.nisn + ")";
    
    // Tarik Jumlah Catatan Prestasi
    google.script.run.withSuccessHandler(data => {
      const filtered = data.filter(item => item.NISN.toString() === appState.user.nisn.toString());
      document.getElementById('count-prestasi').innerText = filtered.length;
    }).getDataFromSheet('PRESTASI');

    // Tarik Jumlah Akumulasi Poin Pelanggaran
    google.script.run.withSuccessHandler(data => {
      const filtered = data.filter(item => item.NISN.toString() === appState.user.nisn.toString());
      let total = 0;
      filtered.forEach(v => total += parseInt(v.Poin || 0));
      document.getElementById('count-pelanggaran').innerText = total;
    }).getDataFromSheet('PELANGGARAN');

    // Ambil Data Berita / Informasi Papan Pengumuman
    const feed = document.getElementById('info-feed-container');
    feed.innerHTML = '<div class="shimmer h-24 rounded-2xl w-full"></div>';
    
    google.script.run.withSuccessHandler(data => {
      const activeInfo = data.filter(i => i.Status.toString().toUpperCase() === 'AKTIF' || i.Status === true);
      if (activeInfo.length === 0) {
        feed.innerHTML = '<p class="text-center text-xs text-gray-400 py-4">Belum ada pengumuman terbaru.</p>';
        return;
      }
      feed.innerHTML = activeInfo.map(info => `
        <div class="p-4 bg-white rounded-2xl border border-gray-100 shadow-sm flex items-start space-x-3.5">
          <div class="p-2.5 bg-blue-50 text-smpprimary rounded-xl text-sm"><i class="fas fa-bullhorn"></i></div>
          <div class="flex-1">
            <span class="text-[10px] text-gray-400 font-bold">${info.Tanggal || ''}</span>
            <h5 class="text-xs font-bold text-slate-800 mt-0.5">${info.Judul || ''}</h5>
            <p class="text-[11px] text-gray-500 mt-1 leading-relaxed">${info.Isi || ''}</p>
          </div>
        </div>
      `).join('');
    }).getDataFromSheet('INFORMASI');
  }

  function loadBiodataData() {
    google.script.run.withSuccessHandler(data => {
      const profil = data.find(item => item.NISN.toString() === appState.user.nisn.toString());
      if (profil) {
        document.getElementById('bio-nama').innerText = profil['Nama Lengkap'] || '-';
        document.getElementById('bio-subtext').innerText = "Kelas " + (profil['Kelas'] || '-');
        document.getElementById('bio-nisn').innerText = profil['NISN'] || '-';
        document.getElementById('bio-kelas').innerText = profil['Kelas'] || '-';
        document.getElementById('bio-alamat').innerText = profil['Alamat'] || '-';
        document.getElementById('bio-wawali').innerText = profil['No WA Ortu'] || '-';
        document.getElementById('bio-hobi').innerText = (profil['Hobi'] || '-') + " / " + (profil['Cita-cita'] || '-');
      }
    }).getDataFromSheet('BIODATA');
  }

  function loadPrestasiData() {
    const list = document.getElementById('prestasi-list-container');
    list.innerHTML = '<div class="shimmer h-16 rounded-xl w-full"></div>'.repeat(3);

    google.script.run.withSuccessHandler(data => {
      const filtered = data.filter(item => item.NISN.toString() === appState.user.nisn.toString());
      if (filtered.length === 0) {
        list.innerHTML = '<p class="text-center text-xs text-gray-400 py-8">Anda belum memiliki riwayat prestasi yang tercatat.</p>';
        return;
      }
      list.innerHTML = filtered.map(item => `
        <div class="p-4 bg-white border border-gray-100 rounded-2xl shadow-sm">
          <div class="flex justify-between items-center mb-2">
            <span class="bg-blue-50 text-smpprimary px-2.5 py-0.5 rounded-lg text-[9px] font-extrabold uppercase tracking-wider">${item.Jenis || 'Lomba'}</span>
            <span class="text-[10px] text-gray-400 font-medium">${item.Tanggal || ''}</span>
          </div>
          <h5 class="text-xs font-bold text-slate-800">${item['Nama Prestasi'] || '-'}</h5>
          <p class="text-[11px] text-gray-500 mt-0.5">Tingkat pencapaian: <span class="font-bold text-slate-700">${item.Tingkat || '-'}</span></p>
        </div>
      `).join('');
    }).getDataFromSheet('PRESTASI');
  }

  function submitPrestasi() {
    const nama = document.getElementById('pres-form-nama').value.trim();
    const jenis = document.getElementById('pres-form-jenis').value.trim();
    const tingkat = document.getElementById('pres-form-tingkat').value.trim();
    const ket = document.getElementById('pres-form-ket').value.trim();

    if (!nama) {
      showAlert('Input Lemah', 'Nama lomba/prestasi wajib diisi.', 'error');
      return;
    }

    const payload = {
      Tanggal: new Date().toISOString().split('T')[0],
      NISN: appState.user.nisn,
      Jenis: jenis,
      'Nama Prestasi': nama,
      Tingkat: tingkat,
      Keterangan: ket
    };

    google.script.run.withSuccessHandler(res => {
      showAlert('Berhasil', 'Data prestasi baru Anda berhasil diajukan.', 'success');
      toggleElement('prestasi-add-box');
      loadPrestasiData();
    }).addDataToSheet('PRESTASI', payload);
  }

  function loadKonselingData() {
    const list = document.getElementById('konseling-list-container');
    list.innerHTML = '<div class="shimmer h-20 rounded-xl w-full"></div>';

    google.script.run.withSuccessHandler(data => {
      const filtered = data.filter(item => item.NISN.toString() === appState.user.nisn.toString());
      if (filtered.length === 0) {
        list.innerHTML = '<p class="text-center text-xs text-gray-400 py-8">Tidak ada catatan pendampingan bimbingan konseling.</p>';
        return;
      }
      list.innerHTML = filtered.map(item => `
        <div class="p-4 bg-white border border-gray-100 rounded-2xl shadow-sm">
          <div class="flex justify-between items-center mb-2 pb-2 border-b border-gray-50">
            <span class="text-[10px] text-gray-400 font-bold">${item.Tanggal || ''}</span>
            <span class="text-[10px] bg-slate-100 text-slate-600 px-2.5 py-0.5 rounded-lg font-bold">Guru: ${item.Guru || 'BK'}</span>
          </div>
          <p class="text-[10px] uppercase font-bold text-gray-400 tracking-wide">Keluhan / Masalah:</p>
          <p class="text-xs font-bold text-slate-800 mb-2.5">${item.Permasalahan || '-'}</p>
          <div class="bg-gray-50/70 p-3 rounded-xl border border-gray-100">
            <p class="text-[9px] uppercase font-bold text-emerald-600 tracking-wide">Solusi & Tindak Lanjut:</p>
            <p class="text-xs text-gray-600 font-medium mt-0.5">${item.Solusi || '-'}</p>
          </div>
        </div>
      `).join('');
    }).getDataFromSheet('PENDAMPINGAN');
  }
</script>
