<style>
  /* Menghilangkan scrollbar kasar default browser */
  ::-webkit-scrollbar {
    width: 4px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: #CBD5E1;
    border-radius: 10px;
  }
  
  /* Logika Navigasi Aktif Modern Style */
  .nav-item {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .nav-item.active {
    color: #0B409C !important;
  }
  .nav-item.active i {
    transform: translateY(-2px);
    color: #0B409C;
    filter: drop-shadow(0 4px 6px rgba(11, 64, 156, 0.25));
  }
  .nav-item.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    width: 16px;
    height: 3px;
    background-color: #F4CE14;
    border-radius: 99px;
  }

  /* Animasi Transisi Halaman (SPA Transition) */
  .fade-in {
    animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes slideUpFade {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Shimmer Loading Effect untuk keindahan SaaS */
  .shimmer {
    background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
    background-size: 200% 100%;
    animation: loadingShimmer 1.5s infinite;
  }
  @keyframes loadingShimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
