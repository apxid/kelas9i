<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MyClass 9I - Dashboard</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0B409C">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { smpprimary: '#0B409C', osisyellow: '#F4CE14', appbg: '#F3F4F6' }
        }
      }
    }
  </script>
  
  <style>
    .nav-item.active { color: #0B409C !important; }
    .nav-item.active i { transform: translateY(-1px); }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-950 flex justify-center items-center min-h-screen font-sans antialiased">

  <div class="w-full max-w-md h-[100vh] sm:h-[840px] bg-appbg shadow-2xl overflow-hidden relative flex flex-col border border-slate-800/50">
    
    <div id="screen-container" class="flex-1 overflow-y-auto bg-gray-50/50 scrollbar-hide">
      <div id="active-view" class="h-full"></div>
    </div>

    <nav id="bottom-nav" class="bg-white/95 backdrop-blur-md border-t border-gray-200/80 px-1 py-2 grid grid-cols-6 items-center z-40">
      <button onclick="switchView('dashboard')" class="nav-item flex flex-col items-center justify-center text-gray-400 py-1 transition-all">
        <i class="fas fa-home text-sm mb-0.5"></i>
        <span class="text-[7px] font-bold uppercase">Home</span>
      </button>
      <button onclick="switchView('profilSiswa')" class="nav-item flex flex-col items-center justify-center text-gray-400 py-1 transition-all">
        <i class="fas fa-user-circle text-sm mb-0.5"></i>
        <span class="text-[7px] font-bold uppercase">Profil</span>
      </button>
      <button onclick="switchView('kas')" class="nav-item flex flex-col items-center justify-center text-gray-400 py-1 transition-all">
        <i class="fas fa-wallet text-sm mb-0.5"></i>
        <span class="text-[7px] font-bold uppercase">Kas</span>
      </button>
      <button onclick="switchView('assisten')" class="nav-item flex flex-col items-center justify-center text-gray-400 py-1 transition-all">
        <i class="fas fa-robot text-sm mb-0.5"></i>
        <span class="text-[7px] font-bold uppercase">Asisten</span>
      </button>
      <button onclick="switchView('informasiSiswa')" class="nav-item flex flex-col items-center justify-center text-gray-400 py-1 transition-all">
        <i class="fas fa-scroll text-sm mb-0.5"></i>
        <span class="text-[7px] font-bold uppercase">Jejak</span>
      </button>
      <button onclick="switchView('isi')" class="nav-item flex flex-col items-center justify-center text-gray-400 py-1 transition-all">
        <i class="fas fa-edit text-sm mb-0.5"></i>
        <span class="text-[7px] font-bold uppercase">Isi</span>
      </button>
    </nav>
  </div>

  <div id="custom-alert" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 opacity-0 pointer-events-none transition-opacity">
    <div class="bg-white p-6 rounded-2xl w-80 shadow-xl text-center">
      <h3 id="alert-title" class="font-bold text-lg text-slate-800"></h3>
      <p id="alert-msg" class="text-sm text-gray-600 mt-2 mb-4"></p>
      <button onclick="closeAlert()" class="w-full bg-smpprimary text-white py-2 rounded-xl font-bold text-sm">Tutup</button>
    </div>
  </div>

  <script>
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbyK6wmxSpZ3tEG0Rar3BlGjp7z-3ZPhTB6NvdmNkx8QlNKSoqafhsY0c1ZAcEMbPyW1VQ/exec";
    
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Failed:', err));
      });
    }
  </script>
  
  <script src="Scripts.js"></script>
  <script src="js/module-dashboard.js"></script>
  <script src="js/module-profil.js"></script>
  <script src="js/module-kas.js"></script>
  <script src="js/module-assisten.js"></script>
  <script src="js/module-jejak.js"></script>
  <script src="js/module-isi.js"></script>

</body>
</html>
