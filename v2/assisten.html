<script>
    // Memastikan skrip tetap berjalan meskipun dimuat via fetch
    function initChat() {
        const input = document.getElementById('chat-input');
        const btn = document.getElementById('btn-send');
        const body = document.getElementById('chat-body');

        if (!input || !btn) {
            console.log("Menunggu elemen chat...");
            setTimeout(initChat, 100); // Coba lagi jika elemen belum ada
            return;
        }

        console.log("Chat siap digunakan.");

        async function kirim() {
            const msg = input.value.trim();
            if (!msg) return;

            // Tampilkan pesan user
            body.innerHTML += `<div class="flex justify-end mb-2"><div class="bg-blue-600 text-white p-2 rounded-lg text-xs w-[80%]">${msg}</div></div>`;
            input.value = "";
            body.scrollTop = body.scrollHeight;

            try {
                const action = msg.startsWith('/') ? 'getCommand' : 'getFAQ';
                const url = `https://script.google.com/macros/s/AKfycbwx1xLp3t0fgG1idoqsz9vCaEd0A3xo8N9pzcLLY8bzzjn9npvoKijXBFtOg4iekBFn1A/exec?action=${action}&keyword=${encodeURIComponent(msg)}`;
                
                const res = await fetch(url);
                const data = await res.json();
                
                const reply = (data.status === "success") ? data.answer : "Maaf, Panda belum mengerti.";
                body.innerHTML += `<div class="flex justify-start mb-2"><div class="bg-white border p-2 rounded-lg text-xs text-gray-700 w-[80%]">🐼 ${reply}</div></div>`;
                body.scrollTop = body.scrollHeight;
            } catch (e) {
                body.innerHTML += `<div class="text-red-500 text-xs p-2">Error koneksi ke server.</div>`;
            }
        }

        btn.onclick = kirim;
        input.onkeypress = (e) => { if (e.key === 'Enter') kirim(); };
    }

    // Panggil fungsi segera
    initChat();
</script>
