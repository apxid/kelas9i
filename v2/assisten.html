<div class="h-full flex flex-col bg-white overflow-hidden">
    <div class="p-4 border-b">
        <h3 class="font-bold text-sm">Panda Assistant</h3>
    </div>

    <div id="chat-body" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50">
        <div class="bg-white p-3 rounded-lg shadow text-xs text-gray-700 w-4/5">
            Halo! Ada yang bisa saya bantu?
        </div>
    </div>

    <div class="p-3 border-t bg-white">
        <div class="flex gap-2">
            <input type="text" id="chat-input" placeholder="Tulis pesan..." 
                   class="flex-1 border rounded px-2 py-1 text-xs focus:outline-none">
            <button id="btn-send" class="bg-blue-600 text-white px-4 py-1 rounded text-xs">Kirim</button>
        </div>
    </div>
</div>

<script>
    console.log("Logika Asisten dimuat langsung.");
    const input = document.getElementById('chat-input');
    const btn = document.getElementById('btn-send');
    const body = document.getElementById('chat-body');

    async function kirim() {
        const msg = input.value.trim();
        if (!msg) return;

        // Tampilkan pesan user
        body.innerHTML += `<div class="flex justify-end mb-2"><div class="bg-blue-600 text-white p-2 rounded-lg text-xs w-[80%]">${msg}</div></div>`;
        input.value = "";
        body.scrollTop = body.scrollHeight;

        try {
            const action = msg.startsWith('/') ? 'getCommand' : 'getFAQ';
            const url = `https://script.google.com/macros/s/AKfycbwx1xLp3t0fgG1idoqsz9vCaEd0A3xo8N9pzcLLY8bzzjn9npvoKijXBFtOg4iekBFn1A/exec?action=${action}&keyword=${encodeURIComponent(msg)}`;
            
            const res = await fetch(url);
            const data = await res.json();
            
            const reply = (data.status === "success") ? data.answer : "Maaf, Panda belum mengerti.";
            body.innerHTML += `<div class="flex justify-start mb-2"><div class="bg-white border p-2 rounded-lg text-xs text-gray-700 w-[80%]">🐼 ${reply}</div></div>`;
            body.scrollTop = body.scrollHeight;
        } catch (e) {
            body.innerHTML += `<div class="text-red-500 text-xs p-2">Error koneksi.</div>`;
        }
    }

    btn.onclick = kirim;
    input.onkeypress = (e) => { if (e.key === 'Enter') kirim(); };
</script>
