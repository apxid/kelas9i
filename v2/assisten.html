<div class="h-full flex flex-col bg-white">
    <div class="p-4 border-b">
        <h3 class="font-bold text-sm">Panda Assistant</h3>
    </div>

    <div id="chat-body" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50">
        <div class="bg-white p-3 rounded-lg shadow text-xs text-gray-700 w-4/5">
            Halo! Silakan ketik pertanyaan Anda.
        </div>
    </div>

    <div class="p-3 border-t bg-white">
        <div class="flex gap-2">
            <input type="text" id="chat-input" placeholder="Tulis pesan..." 
                   class="flex-1 border rounded px-2 py-1 text-xs">
            <button id="btn-send" class="bg-blue-600 text-white px-4 py-1 rounded text-xs">Kirim</button>
        </div>
    </div>
</div>

<script>
    // Kita jalankan fungsi langsung saat file ini di-load oleh fetch
    (function() {
        console.log("Asisten dimuat...");
        const input = document.getElementById('chat-input');
        const btn = document.getElementById('btn-send');
        const body = document.getElementById('chat-body');
        const API = "https://script.google.com/macros/s/AKfycbwx1xLp3t0fgG1idoqsz9vCaEd0A3xo8N9pzcLLY8bzzjn9npvoKijXBFtOg4iekBFn1A/exec";

        async function kirim() {
            const msg = input.value.trim();
            if (!msg) return;

            // 1. Tampilkan di layar
            const div = document.createElement('div');
            div.className = "bg-blue-600 text-white p-2 rounded text-xs ml-auto w-4/5";
            div.innerText = msg;
            body.appendChild(div);
            input.value = "";

            // 2. Fetch ke API
            try {
                const url = `${API}?action=chat&pesan=${encodeURIComponent(msg)}`;
                console.log("Mengirim ke:", url);
                const res = await fetch(url);
                const data = await res.json();
                
                // 3. Jawaban AI
                const reply = document.createElement('div');
                reply.className = "bg-white border p-2 rounded text-xs text-gray-700 w-4/5";
                reply.innerText = "Panda: " + (data.reply || "Error di server");
                body.appendChild(reply);
            } catch (err) {
                console.error("Fetch Error:", err);
                alert("Gagal kirim: " + err.message);
            }
        }

        btn.onclick = kirim;
        input.onkeypress = (e) => { if(e.key === 'Enter') kirim(); };
    })();
</script>
