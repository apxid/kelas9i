<div class="h-full flex flex-col bg-white overflow-hidden">
    <div class="p-3 border-b flex items-center bg-white">
        <img src="https://yanuar-moga.github.io/assistant/assets/icons/panda.png" class="w-8 h-8 rounded-full mr-3" alt="Panda">
        <div>
            <h3 class="font-bold text-slate-800 text-sm">Panda Assistant</h3>
            <p class="text-[9px] text-gray-400">Online | AI Ready</p>
        </div>
    </div>

    <div id="chat-body" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50">
        <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm text-xs text-gray-700 w-[85%]">
            Halo! Ada yang bisa saya bantu hari ini? 🐼
        </div>
    </div>

    <div class="p-3 border-t bg-white">
        <div class="flex items-center gap-2">
            <input type="text" id="chat-input" placeholder="Tulis pertanyaan..." 
                   class="flex-1 text-xs border border-gray-200 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="btn-send" class="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center shrink-0 hover:bg-blue-700 transition">
                <i class="fas fa-paper-plane text-[10px]"></i>
            </button>
        </div>
    </div>
</div>

<script>
    // Fungsi initAssisten yang dipanggil otomatis oleh Scripts.js
    window.initAssisten = function() {
        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('btn-send');
        const chatBody = document.getElementById('chat-body');
        const API_URL = "https://script.google.com/macros/s/AKfycbwx1xLp3t0fgG1idoqsz9vCaEd0A3xo8N9pzcLLY8bzzjn9npvoKijXBFtOg4iekBFn1A/exec";

        const appendMsg = (text, isUser) => {
            const div = document.createElement('div');
            div.className = `p-3 rounded-2xl shadow-sm text-xs w-[85%] ${isUser ? 'bg-blue-600 text-white ml-auto rounded-tr-none' : 'bg-white text-gray-700 rounded-tl-none border'}`;
            div.innerText = isUser ? text : '🐼 ' + text;
            chatBody.appendChild(div);
            chatBody.scrollTop = chatBody.scrollHeight;
        };

        const kirim = async () => {
            const msg = input.value.trim();
            if (!msg) return;

            appendMsg(msg, true);
            input.value = "";
            
            // Loading indicator
            const loadDiv = document.createElement('div');
            loadDiv.className = "text-gray-400 text-[10px] p-2";
            loadDiv.innerText = "Panda sedang berpikir...";
            chatBody.appendChild(loadDiv);
            chatBody.scrollTop = chatBody.scrollHeight;

            try {
                const res = await fetch(`${API_URL}?action=chat&pesan=${encodeURIComponent(msg)}`);
                const data = await res.json();
                loadDiv.remove();
                appendMsg(data.reply || 'Maaf, Panda tidak mengerti.', false);
            } catch (e) {
                loadDiv.remove();
                appendMsg('Gagal terhubung ke server.', false);
            }
        };

        sendBtn.onclick = kirim;
        input.onkeypress = (e) => { if (e.key === 'Enter') kirim(); };
    };
</script>
