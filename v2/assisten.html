<div class="h-full flex flex-col bg-white">
    <!-- Chat Header -->
    <div class="p-4 border-b flex items-center bg-white">
        <img src="https://yanuar-moga.github.io/assistant/assets/icons/panda.png" class="w-8 h-8 rounded-full mr-3" alt="Panda">
        <div>
            <h3 class="font-bold text-slate-800 text-sm">Panda Assistant</h3>
            <p class="text-[10px] text-gray-400">Siap membantu 24/7</p>
        </div>
    </div>

    <!-- Chat Area -->
    <div id="chat-body" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50">
        <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm text-xs text-gray-700 w-4/5">
            Halo! Ada yang bisa saya bantu hari ini? 🐼
        </div>
    </div>

    <!-- Chat Input Bar -->
    <div class="p-3 border-t bg-white">
        <div class="flex items-center gap-2">
            <input type="text" id="chat-input" placeholder="Tulis pertanyaan..." 
                   class="flex-1 text-xs border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-smpprimary">
            <button id="btn-send" class="bg-smpprimary text-white w-8 h-8 rounded-full flex items-center justify-center shrink-0">
                <i class="fas fa-paper-plane text-[10px]"></i>
            </button>
        </div>
    </div>
</div>

<script>
    function initAssisten() {
        const ASSISTANT_API = "https://script.google.com/macros/s/AKfycbwx1xLp3t0fgG1idoqsz9vCaEd0A3xo8N9pzcLLY8bzzjn9npvoKijXBFtOg4iekBFn1A/exec";
        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('btn-send');
        const chatBody = document.getElementById('chat-body');

        async function kirimPesan() {
            const msg = input.value.trim();
            if (!msg) return;

            // 1. Tampilkan pesan user
            chatBody.innerHTML += `<div class="bg-smpprimary text-white p-3 rounded-2xl rounded-tr-none shadow-sm text-xs ml-auto w-4/5">${msg}</div>`;
            input.value = "";
            chatBody.scrollTop = chatBody.scrollHeight;

            // 2. Tampilkan indikator loading
            const loadingId = 'loading-msg';
            chatBody.innerHTML += `<div id="${loadingId}" class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm text-xs text-gray-400 w-4/5">Panda sedang berpikir...</div>`;
            chatBody.scrollTop = chatBody.scrollHeight;

            try {
                // 3. Panggil API
                const response = await fetch(`${ASSISTANT_API}?action=chat&pesan=${encodeURIComponent(msg)}`);
                const result = await response.json();

                // 4. Hapus loading dan tampilkan jawaban
                document.getElementById(loadingId).remove();
                chatBody.innerHTML += `<div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm text-xs text-gray-700 border w-4/5">${result.reply || 'Maaf, Panda sedang lelah...'}</div>`;
            } catch (error) {
                document.getElementById(loadingId).remove();
                chatBody.innerHTML += `<div class="bg-red-50 p-3 rounded-2xl rounded-tl-none shadow-sm text-xs text-red-600 border border-red-100 w-4/5">Gagal terhubung ke server.</div>`;
            }
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        sendBtn.onclick = kirimPesan;
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') kirimPesan(); });
    }
</script>
