<div class="h-full flex flex-col bg-white">
    <div class="p-4 border-b flex items-center bg-white">
        <img src="https://yanuar-moga.github.io/assistant/assets/icons/panda.png" class="w-8 h-8 rounded-full mr-3" alt="Panda">
        <div>
            <h3 class="font-bold text-slate-800 text-sm">Panda Assistant</h3>
            <p class="text-[10px] text-gray-400">Siap membantu 24/7</p>
        </div>
    </div>

    <div id="chat-body" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50">
        <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm text-xs text-gray-700 w-4/5">
            Halo! Ada yang bisa saya bantu hari ini? 🐼
        </div>
    </div>

    <div class="p-3 border-t bg-white">
        <div class="flex items-center gap-2">
            <input type="text" id="chat-input" placeholder="Tulis pertanyaan..." 
                   class="flex-1 text-xs border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-smpprimary">
            <button id="btn-send" class="bg-smpprimary text-white w-8 h-8 rounded-full flex items-center justify-center">
                <i class="fas fa-paper-plane text-[10px]"></i>
            </button>
        </div>
    </div>
</div>

<script>
    // Inisialisasi logika asisten sederhana
    function initAssisten() {
        const input = document.getElementById('chat-input');
        const sendBtn = document.getElementById('btn-send');
        const chatBody = document.getElementById('chat-body');

        sendBtn.onclick = function() {
            const msg = input.value.trim();
            if (msg) {
                // Tambah pesan user
                chatBody.innerHTML += `<div class="bg-smpprimary text-white p-3 rounded-2xl rounded-tr-none shadow-sm text-xs ml-auto w-4/5">${msg}</div>`;
                input.value = "";
                chatBody.scrollTop = chatBody.scrollHeight;
                
                // Trigger logika backend asisten Anda di sini
                // Contoh: callBackend('tanyaAI', { pesan: msg }).then(...)
            }
        };
    }
</script>
