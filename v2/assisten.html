<script>
        // Gunakan URL yang sudah ada di HTML Anda
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzMe6SvN_qVVUG48vkCoMphQINZRV3BU_7nEz8cyO13Y5a5iC7xRQD9eH1lFRGwsi8ZNw/exec";
        
        // Fungsi untuk menambahkan pesan ke layar
        function addMessage(text, sender) {
            const body = document.getElementById('chat-body');
            const div = document.createElement('div');
            div.className = `bubble ${sender}`;
            div.innerText = text;
            body.appendChild(div);
            body.scrollTop = body.scrollHeight;
        }

        // Fungsi utama pengiriman pesan
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if (!val) return;

            addMessage(val, 'user');
            input.value = '';

            // Menangani registrasi nama pengguna
            if (!localStorage.getItem('panda_user')) {
                localStorage.setItem('panda_user', val);
                addMessage(`Halo ${val}! Apa yang ingin ditanyakan?`, 'panda');
                return;
            }

            const typing = document.createElement('div');
            typing.className = 'bubble panda';
            typing.innerText = "Panda sedang mengetik...";
            document.getElementById('chat-body').appendChild(typing);

            try {
                // Penentuan action berdasarkan input (Command atau FAQ)
                const action = val.startsWith('/') ? 'getCommand' : 'getFAQ';
                
                // Membentuk URL sesuai dengan parameter yang diminta skrip GAS Anda
                const url = `${GAS_URL}?action=${action}&keyword=${encodeURIComponent(val)}&userName=${encodeURIComponent(localStorage.getItem('panda_user') || 'Pengunjung')}`;
                
                const res = await fetch(url);
                const data = await res.json();
                
                typing.remove();
                
                // Menampilkan jawaban dari GAS
                if (data.status === "success" && data.answer) {
                    addMessage(data.answer, 'panda');
                } else {
                    addMessage("Maaf, saya belum mengerti itu.", 'panda');
                }
            } catch(err) {
                typing.remove();
                addMessage("Maaf, koneksi gagal.", 'panda');
            }
        }
    </script>
