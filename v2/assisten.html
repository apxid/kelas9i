<style>
    /* 1. Animasi Typewriter (Looping & Presisi) */
    .typewriter {
        display: inline-block;
        overflow: hidden;
        white-space: nowrap;
        border-right: 2px solid white;
        /* Lebar disesuaikan dengan jumlah karakter 'PANDA ASSISTANT' (15 karakter) */
        width: 15ch; 
        animation: typing 3s steps(15, end) infinite, blink 0.75s step-end infinite;
    }

    @keyframes typing { 0% { width: 0; } 50% { width: 15ch; } 100% { width: 15ch; } }
    @keyframes blink { 50% { border-color: transparent; } }

    /* 2. Ekor Balon Chat yang Rapi dan Menyatu */
    .bubble-user { 
        position: relative; 
        border-bottom-right-radius: 4px !important; 
    }
    .bubble-user::after { 
        content: ''; position: absolute; right: -8px; bottom: 0; 
        width: 0; height: 0;
        border-left: 8px solid #2563eb; 
        border-top: 8px solid transparent; 
    }

    .bubble-panda { 
        position: relative; 
        border-bottom-left-radius: 4px !important; 
    }
    .bubble-panda::after { 
        content: ''; position: absolute; left: -8px; bottom: 0; 
        width: 0; height: 0;
        border-right: 8px solid white; 
        border-top: 8px solid transparent; 
    }
</style>

<div id="panda-chat" class="h-full w-full bg-white flex flex-col overflow-hidden">
    <!-- Header -->
    <div class="bg-[#075E54] p-4 flex items-center shrink-0">
        <img src="https://apxid.github.io/assistant/assets/mypanda.gif" class="w-10 h-10 mr-3">
        <span class="text-white font-bold text-sm">
            <span class="typewriter">PANDA ASSISTANT</span>
        </span>
    </div>

    <!-- Chat Body -->
    <div id="chat-body" class="flex-1 p-4 overflow-y-auto bg-[#e5ddd5] flex flex-col space-y-3">
        <div class="flex justify-start mb-2">
            <div class="bg-white p-3 rounded-lg shadow text-xs text-gray-700 bubble-panda w-fit max-w-[80%]">Halo! Saya Panda. Siapa nama kamu?</div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-3 bg-white border-t flex items-center shrink-0">
        <input type="text" id="chat-input" placeholder="Ketik pesan..." 
               class="flex-1 border rounded-full px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-[#075E54]">
        <button id="btn-send" class="ml-2 bg-[#075E54] text-white w-10 h-10 rounded-full flex items-center justify-center">➤</button>
    </div>
</div>

<script>
    (function() {
        const API = "https://script.google.com/macros/s/AKfycbzMe6SvN_qVVUG48vkCoMphQINZRV3BU_7nEz8cyO13Y5a5iC7xRQD9eH1lFRGwsi8ZNw/exec";

        async function kirimPesan() {
            const input = document.getElementById('chat-input');
            const chatBody = document.getElementById('chat-body');
            if (!input || !chatBody) return;

            const msg = input.value.trim();
            if (!msg) return;

            // Tampilkan pesan user
            chatBody.innerHTML += `<div class="flex justify-end mb-2"><div class="bg-blue-600 text-white p-2 rounded-lg text-xs bubble-user w-fit max-w-[80%]">${msg}</div></div>`;
            input.value = "";
            chatBody.scrollTop = chatBody.scrollHeight;

            // Registrasi Nama
            if (!localStorage.getItem('panda_user')) {
                localStorage.setItem('panda_user', msg);
                chatBody.innerHTML += `<div class="flex justify-start mb-2"><div class="bg-white p-3 rounded-lg shadow text-xs text-gray-700 bubble-panda w-fit max-w-[80%]">Halo ${msg}! Apa yang ingin ditanyakan?</div></div>`;
                chatBody.scrollTop = chatBody.scrollHeight;
                return;
            }

            // Indikator Mengetik
            const typingId = 'typing-indicator';
            chatBody.innerHTML += `<div id="${typingId}" class="text-xs text-gray-500 italic ml-2 mb-2">Panda sedang mengetik . . .</div>`;
            chatBody.scrollTop = chatBody.scrollHeight;

            try {
                const userName = localStorage.getItem('panda_user');
                const url = `${API}?question=${encodeURIComponent(msg)}&userName=${encodeURIComponent(userName)}`;
                const res = await fetch(url);
                const data = await res.json();
                
                document.getElementById(typingId).remove();
                const reply = data.answer || "Maaf, Panda belum mengerti.";
                
                chatBody.innerHTML += `<div class="flex justify-start mb-2"><div class="bg-white p-3 rounded-lg shadow text-xs text-gray-700 bubble-panda w-fit max-w-[80%]">🐼 ${reply}</div></div>`;
                chatBody.scrollTop = chatBody.scrollHeight;
            } catch (e) {
                const el = document.getElementById(typingId);
                if (el) el.remove();
                chatBody.innerHTML += `<div class="text-red-500 text-xs p-2 text-center">Error koneksi ke server.</div>`;
            }
        }

        document.addEventListener('click', (e) => { if (e.target.id === 'btn-send') kirimPesan(); });
        document.addEventListener('keypress', (e) => { if (e.target.id === 'chat-input' && e.key === 'Enter') kirimPesan(); });
    })();
</script>
