<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Bendahara</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:#f3f4f6; color:#111827; width:100%; max-width:600px; margin:auto; min-height:100vh; padding-bottom:80px; }
        .hidden { display:none !important; }

        /* HEADER & CARD */
        .header { background:linear-gradient(135deg, #4f46e5, #7c3aed); padding:34px 20px; text-align:center; color:white; }
        .container { padding:16px; }
        .card { background:white; border-radius:24px; padding:18px; margin-bottom:16px; box-shadow:0 4px 16px rgba(0,0,0,.06); }
        input, select { width:100%; padding:12px; border:1px solid #ddd; border-radius:12px; margin-bottom:10px; }
        button { width:100%; background:linear-gradient(135deg, #4f46e5, #7c3aed); color:white; border:none; border-radius:14px; padding:14px; font-weight:700; cursor:pointer; }

        /* NAVIGASI BERSIH */
        .nav-bottom { position:fixed; bottom:0; left:0; right:0; background:#ffffff; border-top:1px solid #e5e7eb; display:flex; justify-content:space-around; align-items:center; padding:10px 0; z-index:1000; margin:auto; max-width:600px; }
        .nav-item { display:flex; flex-direction:column; align-items:center; text-decoration:none; color:#9ca3af; font-size:10px; font-weight:600; flex:1; cursor:pointer; }
        .nav-item.active { color:#4f46e5; }
        .nav-icon { font-size:20px; margin-bottom:2px; }

        /* DATA STYLING */
        .kategoriRow { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .kategoriLabel { font-weight:500; font-size:14px; }
        .kategoriInput { width:120px !important; margin-bottom:0 !important; }
        .saldoItem { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee; font-size:14px; }
        .totalSaldo { background:#4f46e5; color:white; padding:10px; border-radius:12px; display:flex; justify-content:space-between; font-weight:700; margin-top:10px; }
        .lunas { background:#dcfce7; color:#166534; padding:2px 8px; border-radius:6px; font-size:12px; }
        .kurang { color:#dc2626; font-weight:600; }
        .popup { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:10px 20px; border-radius:8px; z-index:9999; }
        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th, td { padding:10px; border-bottom:1px solid #ddd; text-align:center; font-size:13px; }
    </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="container">
    <div class="header" style="border-radius:24px; margin-bottom:20px;">
        <div class="logo" style="font-size:30px;">💰</div>
        <div class="title" style="font-weight:700;">E-Bendahara</div>
    </div>
    <div class="card">
        <input type="password" id="pin" placeholder="PIN Keamanan">
        <button onclick="login()">MASUK</button>
    </div>
</div>

<!-- ADMIN PAGE -->
<div id="adminPage" class="hidden">
    <div class="header">
        <h2 id="namaAdmin"></h2>
        <p id="roleText"></p>
        <p style="font-size:12px; opacity:0.8;">Update: <span id="adminUpdateTanggal">-</span> oleh <span id="adminUpdateOleh">-</span></p>
        <button onclick="logout(this)" style="background:rgba(255,255,255,0.2); margin-top:10px; padding:8px;">Logout</button>
    </div>
    
    <div id="menuInput" class="container">
        <div class="card">
            <select id="siswaSelect"></select>
            <div id="kategoriBox"></div>
            <button onclick="saveTransaksi()">SIMPAN TRANSAKSI</button>
        </div>
        <div class="card">
            <h3>Setoran</h3>
            <input type="number" id="setorKAS" placeholder="KAS">
            <input type="number" id="setorGALON" placeholder="GALON">
            <input type="number" id="setorKARTU" placeholder="KARTU">
            <input type="number" id="setorTALI" placeholder="TALI">
            <input type="text" id="penerima" placeholder="Penerima">
            <button onclick="saveSetor()">SIMPAN SETORAN</button>
        </div>
    </div>
    
    <div id="menuRekap" class="container hidden">
        <div class="card">
            <table id="rekapTable"></table>
        </div>
    </div>
    
    <div id="menuSaldo" class="container hidden">
        <div class="card" id="saldoContent"></div>
    </div>

    <nav class="nav-bottom">
        <a href="#" class="nav-item active" id="btnInput" onclick="showMenu('input')"><div class="nav-icon">📝</div>ISI</a>
        <a href="#" class="nav-item" id="btnRekap" onclick="showMenu('showMenu')"><div class="nav-icon">📜</div>REKAP</a>
        <a href="#" class="nav-item" id="btnSaldo" onclick="showMenu('saldo')"><div class="nav-icon">💰</div>SALDO</a>
    </nav>
</div>

<!-- SISWA PAGE -->
<div id="siswaPage" class="hidden">
    <div class="header">
        <img id="fotoSiswa" style="width:80px; height:80px; border-radius:50%; border:2px solid white;">
        <h2 id="namaSiswa"></h2>
        <p id="nisnSiswa"></p>
        <p id="jkSiswa"></p>
        <p style="font-size:12px; opacity:0.8;">Update: <span id="lastUpdateTanggal">-</span> oleh <span id="lastUpdateOleh">-</span></p>
        <button onclick="logout(this)" style="background:rgba(255,255,255,0.2); margin-top:10px; padding:8px;">Logout</button>
    </div>
    <div class="container">
        <div class="card">
            <h3>Iuran Terbayar</h3>
            <div id="sudahBayar"></div>
        </div>
        <div class="card">
            <h3>Kekurangan</h3>
            <div id="belumBayar"></div>
        </div>
    </div>
</div>

<script>
// ========================================
// CONFIG
// ========================================
const API_URL = "https://script.google.com/macros/s/AKfycbzf042PIcQiNf0IZ4lIc8J4JG4zN3RvaHEt-WdctQdHKGOhNcE1Mews2UHziRvcqSOi/exec";

let TARGET = [];
let DASHBOARD = {};

let LOGIN_NAME = "";
let LOGIN_ROLE = "";
let LOGIN_PIN = "";

// Helper untuk membaca informasi Device pengguna secara otomatis
function getClientDevice() {
  if (navigator.userAgentData && navigator.userAgentData.platform) {
    return navigator.userAgentData.platform;
  }
  const userAgent = navigator.userAgent;
  if (userAgent.match(/Android/i)) return "Android Phone";
  if (userAgent.match(/iPhone|iPad|iPod/i)) return "iOS Device";
  if (userAgent.match(/Windows/i)) return "Windows PC";
  if (userAgent.match(/Macintosh/i)) return "Mac Computer";
  if (userAgent.match(/Linux/i)) return "Linux PC";
  return "Perangkat Web";
}

// Helper untuk membaca IP Publik secara dinamis via API ipify
async function getClientIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    return data.ip || "-";
  } catch (err) {
    return "-";
  }
}

// ========================================
// FETCH DATA
// ========================================
async function postData(data){
  const res = await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify(data)
  });
  return await res.json();
}

// ========================================
// POPUP
// ========================================
function popup(text){
  const div = document.createElement("div");
  div.className = "popup";
  div.innerHTML = text;
  document.body.appendChild(div);
  setTimeout(()=>{ div.remove(); },2500);
}

// ========================================
// ENTER LOGIN
// ========================================
document.getElementById("pin").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    login();
  }
});

// ========================================
// AUTO LOGIN ONLOAD
// ========================================
window.onload = async function(){
  const pin = localStorage.getItem("eb_pin");
  const role = localStorage.getItem("eb_role");
  const nama = localStorage.getItem("eb_nama");
  const user = localStorage.getItem("eb_user");

  if(!pin){
    return;
  }

  LOGIN_PIN = pin;
  LOGIN_NAME = nama || "";
  LOGIN_ROLE = user || "";

  // Ambil data tracking saat auto-login dijalankan
  const currentIP = await getClientIP();
  const currentDevice = getClientDevice();

  // Kirim data restore session ke Apps Script
  try {
    await postData({
      action: "restoreSession",
      sessionId: localStorage.getItem("eb_session_id") || "",
      ip: currentIP,
      device: currentDevice
    });
  } catch (e) {}

  // SISWA
  if(role == "SISWA"){
    await loadSiswaDashboard(pin);
  }
  // ADMIN
  else{
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("adminPage").classList.remove("hidden");
    document.getElementById("namaAdmin").innerHTML = LOGIN_NAME;
    document.getElementById("roleText").innerHTML = LOGIN_ROLE;
    await loadDashboard();
  }
};

// ========================================
// LOGIN WITH TRACKING EXTENSION & ANTI-SPAM
// ========================================
async function login(){
  const pin = document.getElementById("pin").value.trim();

  if(pin == ""){
    popup("PIN wajib diisi");
    return;
  }

  // Target tombol login
  const loginBtn = document.querySelector("#loginPage button");
  const originalText = loginBtn.innerHTML;
  
  // Kunci tombol segera setelah diklik pertama kali
  loginBtn.disabled = true;
  loginBtn.innerHTML = "MEMPROSES...";

  try {
    // Melacak IP dan Nama Perangkat secara real-time sebelum request dikirim
    const userIP = await getClientIP();
    const userDevice = getClientDevice();

    const res = await postData({
      action:"login",
      pin:pin,
      ip: userIP,         // Mengirim variabel IP Publik asli ke log baru
      device: userDevice  // Mengirim info Perangkat asli ke log baru
    });

    if(!res.success){
      popup(res.message);
      // Lepas kunci tombol jika login ditolak/gagal
      loginBtn.disabled = false;
      loginBtn.innerHTML = originalText;
      return;
    }

    LOGIN_NAME = res.nama;
    LOGIN_ROLE = res.user;
    LOGIN_PIN = pin;

    localStorage.setItem("eb_pin", pin);
    localStorage.setItem("eb_role", res.role);
    localStorage.setItem("eb_nama", res.nama);
    localStorage.setItem("eb_user", res.user);
    localStorage.setItem("eb_session_id", res.sessionId || "");

    // SISWA
    if(res.role == "SISWA"){
      await loadSiswaDashboard(pin);
      popup("Login berhasil");
      return;
    }

    // ADMIN
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("adminPage").classList.remove("hidden");
    document.getElementById("namaAdmin").innerHTML = LOGIN_NAME;
    document.getElementById("roleText").innerHTML = LOGIN_ROLE;

    await loadDashboard();
    popup("Login berhasil");

  } catch (error) {
    popup("Gangguan koneksi, silakan coba lagi");
    // Lepas kunci tombol jika terjadi error jaringan saat login
    loginBtn.disabled = false;
    loginBtn.innerHTML = originalText;
  }
}

// ========================================
// LOAD DASHBOARD
// ========================================
async function loadDashboard(){
  const res = await postData({
    action:"getDashboard"
  });

  if(!res.success){
    popup("Gagal load dashboard");
    return;
  }

  DASHBOARD = res;
  TARGET = res.target;

  // Render info update di sisi admin page
  document.getElementById("adminUpdateTanggal").innerHTML = res.lastUpdateDate || "-";
  document.getElementById("adminUpdateOleh").innerHTML = res.lastUpdateBy || "-";

  renderSiswa();
  renderKategori();
  renderRekap();
  renderSaldo();
}

// ========================================
// RENDER SISWA
// ========================================
function renderSiswa(){
  const select = document.getElementById("siswaSelect");
  select.innerHTML = "";

  DASHBOARD.siswa.forEach(s=>{
    select.innerHTML += `
      <option value="${s.no}|${s.nama}">
        ${s.nama}
      </option>
    `;
  });
}

// ========================================
// RENDER KATEGORI
// ========================================
function renderKategori(){
  const box = document.getElementById("kategoriBox");
  box.innerHTML = "";

  TARGET.forEach(t=>{
    box.innerHTML += `
      <div class="kategoriRow">
        <div class="kategoriLabel">
          ${t.kategori}
        </div>
        <input type="number" id="kat_${t.kategori}" value="0" class="kategoriInput">
      </div>
    `;
  });
}

// ========================================
// SAVE TRANSAKSI WITH ANTI-SPAM
// ========================================
async function saveTransaksi(){
  const siswa = document.getElementById("siswaSelect").value.split("|");
  let adaInput = false;

  // Target tombol "SIMPAN TRANSAKSI"
  const simpanBtn = document.querySelector("#menuInput button[onclick='saveTransaksi()']");
  const originalText = simpanBtn.innerHTML;

  // Kunci tombol sebelum perulangan AJAX / pengiriman ke GAS dimulai
  simpanBtn.disabled = true;
  simpanBtn.innerHTML = "MENYIMPAN...";

  try {
    for(let i=0; i<TARGET.length; i++){
      const t = TARGET[i];
      const nominal = Number(document.getElementById("kat_" + t.kategori).value || 0);

      if(nominal > 0){
        adaInput = true;
        await postData({
          action:"saveTransaksi",
          no:siswa[0],
          nama:siswa[1],
          kategori:t.kategori,
          jumlah:nominal,
          oleh:LOGIN_NAME
        });
      }
    }

    if(!adaInput){
      popup("Isi minimal 1 nominal");
      // Lepas kunci jika nominal input kosong semuanya
      simpanBtn.disabled = false;
      simpanBtn.innerHTML = originalText;
      return;
    }

    await loadDashboard();
    renderKategori();
    popup("Transaksi berhasil");

  } catch (error) {
    popup("Gagal menyimpan, silakan coba kembali");
  } finally {
    // Apapun hasil akhirnya (berhasil/gagal), kembalikan tombol ke status aktif
    simpanBtn.disabled = false;
    simpanBtn.innerHTML = originalText;
  }
}

// ========================================
// SAVE SETOR WITH ANTI-SPAM
// ========================================
async function saveSetor(){
  // Target tombol "SIMPAN SETORAN"
  const setorBtn = document.querySelector("#menuInput button[onclick='saveSetor()']");
  const originalText = setorBtn.innerHTML;

  // Kunci tombol setoran agar tidak diklik ganda
  setorBtn.disabled = true;
  setorBtn.innerHTML = "MENYETOR...";

  try {
    const res = await postData({
      action:"saveSetor",
      KAS: document.getElementById("setorKAS").value || 0,
      GALON: document.getElementById("setorGALON").value || 0,
      KARTU: document.getElementById("setorKARTU").value || 0,
      TALI: document.getElementById("setorTALI").value || 0,
      penerima: document.getElementById("penerima").value
    });

    if(res.success){
      document.getElementById("setorKAS").value = "";
      document.getElementById("setorGALON").value = "";
      document.getElementById("setorKARTU").value = "";
      document.getElementById("setorTALI").value = "";
      document.getElementById("penerima").value = "";

      await loadDashboard();
      popup("Setoran berhasil");
    }
  } catch (error) {
    popup("Gagal mengirim setoran, periksa jaringan");
  } finally {
    // Kembalikan tombol ke keadaan semula setelah proses backend selesai
    setorBtn.disabled = false;
    setorBtn.innerHTML = originalText;
  }
}

// ========================================
// RENDER REKAP
// ========================================
function renderRekap(){
  const table = document.getElementById("rekapTable");
  let html = "";

  DASHBOARD.rekap.forEach((row,index)=>{
    html += "<tr>";
    row.forEach((cell,col)=>{
      // HEADER
      if(index === 0){
        html += `<th>${cell}</th>`;
      }
      // BODY
      else{
        // NAMA SISWA
        if(col === 0){
          html += `<td style="text-align:left; font-weight:600">${cell}</td>`;
        }
        // STATUS LUNAS
        else if(String(cell).toUpperCase() === "LUNAS"){
          html += `<td><span class="lunas">LUNAS</span></td>`;
        }
        // ANGKA SISA
        else{
          const nominal = Number(cell || 0);
          html += `<td><span class="kurang">Rp${nominal.toLocaleString('id-ID')}</span></td>`;
        }
      }
    });
    html += "</tr>";
  });

  table.innerHTML = html;
}

// ========================================
// RENDER SALDO
// ========================================
function renderSaldo(){
  const saldo = DASHBOARD.saldo;

  let pemasukanHTML = "";
  let setorHTML = "";
  let saldoHTML = "";

  let totalMasuk = 0;
  let totalKeluar = 0;
  let totalSaldo = 0;

  saldo.slice(1).forEach(s=>{
    const kategori = s[0];
    const masuk = Number(s[1] || 0);
    const keluar = Number(s[2] || 0);
    const akhir = Number(s[3] || 0);

    totalMasuk += masuk;
    totalKeluar += keluar;
    totalSaldo += akhir;

    pemasukanHTML += `
      <div class="saldoItem">
        <div>${kategori}</div>
        <div>Rp${masuk.toLocaleString('id-ID')}</div>
      </div>
    `;

    setorHTML += `
      <div class="saldoItem">
        <div>${kategori}</div>
        <div>Rp${keluar.toLocaleString('id-ID')}</div>
      </div>
    `;

    saldoHTML += `
      <div class="saldoItem">
        <div>${kategori}</div>
        <div>Rp${akhir.toLocaleString('id-ID')}</div>
      </div>
    `;
  });

  document.getElementById("saldoContent").innerHTML = `
    <div class="saldoSection">
      <h3 class="saldoTitle">Total Pemasukan</h3>
      ${pemasukanHTML}
      <div class="totalSaldo">
        <div>TOTAL MASUK</div>
        <div>Rp${totalMasuk.toLocaleString('id-ID')}</div>
      </div>
    </div>

    <div class="saldoSection">
      <h3 class="saldoTitle">Sudah Disetor</h3>
      ${setorHTML}
      <div class="totalSaldo">
        <div>TOTAL SETOR</div>
        <div>Rp${totalKeluar.toLocaleString('id-ID')}</div>
      </div>
    </div>

    <div class="saldoSection">
      <h3 class="saldoTitle">Saldo Bendahara</h3>
      ${saldoHTML}
      <div class="totalSaldo">
        <div>TOTAL SALDO</div>
        <div>Rp${totalSaldo.toLocaleString('id-ID')}</div>
      </div>
    </div>
  `;
}

// ========================================
// MENU TABS PANEL SWITCH
// ========================================
function showMenu(menu){
  document.getElementById("menuInput").classList.add("hidden");
  document.getElementById("menuRekap").classList.add("hidden");
  document.getElementById("menuSaldo").classList.add("hidden");

  document.getElementById("btnInput").classList.remove("active");
  document.getElementById("btnRekap").classList.remove("active");
  document.getElementById("btnSaldo").classList.remove("active");

  if(menu == "input"){
    document.getElementById("menuInput").classList.remove("hidden");
    document.getElementById("btnInput").classList.add("active");
  }
  if(menu == "rekap"){
    document.getElementById("menuRekap").classList.remove("hidden");
    document.getElementById("btnRekap").classList.add("active");
  }
  if(menu == "saldo"){
    document.getElementById("menuSaldo").classList.remove("hidden");
    document.getElementById("btnSaldo").classList.add("active");
  }
}

// ========================================
// DASHBOARD SISWA VIEW (DENGAN TOTAL AKUMULASI)
// ========================================
async function loadSiswaDashboard(nisn){
  const res = await postData({
    action:"getSiswaDashboard",
    nisn:nisn
  });

  if(!res.success){
    popup("Data tidak ditemukan");
    return;
  }

  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("siswaPage").classList.remove("hidden");

  document.getElementById("fotoSiswa").src = res.siswa.foto;
  document.getElementById("namaSiswa").innerHTML = res.siswa.nama;
  document.getElementById("jkSiswa").innerHTML = res.siswa.jk;
  document.getElementById("nisnSiswa").innerHTML = res.siswa.nisn;

  // Menampilkan Info Last Update dari properti Apps Script ke Element HTML
  document.getElementById("lastUpdateTanggal").innerHTML = res.lastUpdateDate || "-";
  document.getElementById("lastUpdateOleh").innerHTML = res.lastUpdateBy || "-";

  let bayar = "";
  let kurang = "";
  
  // Inisialisasi variabel matematika penghitung total akumulasi iuran
  let akumulasiBayar = 0;
  let akumulasiKurang = 0;

  // Render per baris iuran SUDAH DIBAYAR sekaligus menambahkan nominal ke total akumulasi
  Object.keys(res.bayar).forEach(k=>{
    const nominal = Number(res.bayar[k] || 0);
    akumulasiBayar += nominal;
    
    bayar += `
      <div class="saldoItem">
        <div>${k}</div>
        <div>Rp${nominal.toLocaleString('id-ID')}</div>
      </div>
    `;
  });

  // Render per baris iuran BELUM DIBAYAR sekaligus menambahkan nominal ke total akumulasi
  Object.keys(res.kurang).forEach(k=>{
    const nominal = Number(res.kurang[k] || 0);
    akumulasiKurang += nominal;
    
    kurang += `
      <div class="saldoItem">
        <div>${k}</div>
        <div>Rp${nominal.toLocaleString('id-ID')}</div>
      </div>
    `;
  });

  // MENAMBAHKAN BARIS TOTAL SUDAH DIBAYAR (Tema Biru bawaan .totalSaldo)
  bayar += `
    <div class="totalSaldo" style="margin-top: 14px;">
      <div>TOTAL SUDAH DIBAYAR</div>
      <div>Rp${akumulasiBayar.toLocaleString('id-ID')}</div>
    </div>
  `;

  // MENAMBAHKAN BARIS TOTAL SISA TAGIHAN (Diberi override warna Merah #ef4444 sebagai penarik perhatian)
  kurang += `
    <div class="totalSaldo" style="margin-top: 14px; background: #ef4444;">
      <div>TOTAL SISA TAGIHAN</div>
      <div>Rp${akumulasiKurang.toLocaleString('id-ID')}</div>
    </div>
  `;

  document.getElementById("sudahBayar").innerHTML = bayar;
  document.getElementById("belumBayar").innerHTML = kurang;
}

// ========================================
// LOGOUT WITH LOG CONSTRAINTS & ANTI-SPAM ANIMATION
// ========================================
async function logout(element){
  // Validasi jika element pengirim dioperasikan langsung dari komponen DOM button
  if (element && element.tagName === "BUTTON") {
    element.disabled = true;
    element.innerHTML = "KELUAR...";
  }

  try{
    await postData({
      action:"logout",
      sessionId: localStorage.getItem("eb_session_id") || "-"
    });
  }catch(err){}

  localStorage.removeItem("eb_pin");
  localStorage.removeItem("eb_role");
  localStorage.removeItem("eb_nama");
  localStorage.removeItem("eb_user");
  localStorage.removeItem("eb_session_id");

  location.reload();
}
</script>
</body>
</html>
