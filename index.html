<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SIAKAD - Dashboard Wali Kelas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { smpprimary: '#0B409C', osisyellow: '#F4CE14', appbg: '#F3F4F6' }
        }
      }
    }
  </script>
  
  <style>
    .nav-item.active { color: #0B409C !important; }
    .nav-item.active i { transform: translateY(-1px); filter: drop-shadow(0 4px 6px rgba(11, 64, 156, 0.25)); }
    .fade-in { animation: slideUp 0.35s ease forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .shimmer { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: load 1.5s infinite; }
    @keyframes load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="bg-slate-950 flex justify-center items-center min-h-screen font-sans antialiased">

  <div class="w-full max-w-md h-[100vh] sm:h-[840px] bg-appbg shadow-2xl overflow-hidden relative flex flex-col sm:rounded-[36px] border border-slate-800/50">
    
    <div class="bg-smpprimary text-white text-[11px] px-6 pt-3 pb-1.5 flex justify-between items-center font-semibold select-none z-50">
      <span id="app-clock">00:00</span>
      <div class="flex items-center space-x-2">
        <i class="fas fa-signal"></i>
        <i class="fas fa-wifi"></i>
        <i class="fas fa-battery-full text-osisyellow text-xs"></i>
      </div>
    </div>

    <div id="screen-container" class="flex-1 overflow-y-auto bg-gray-50/50">
      <div id="active-view"></div>
    </div>

    <nav id="bottom-nav" class="absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-gray-200/80 px-2 py-2.5 flex justify-around items-center z-40 sm:rounded-b-[36px]">
      <button onclick="switchView('berandaKelas')" class="nav-item flex flex-col items-center justify-center text-gray-400 py-1 flex-1 transition-all">
        <i class="fas fa-school text-lg mb-0.5"></i>
        <span class="text-[9px] font-bold uppercase tracking-wider">Beranda</span>
      </button>
      <button onclick="switchView('formBiodata')" class="nav-item flex flex-col items-center justify-center text-gray-400 py-1 flex-1 transition-all">
        <i class="fas fa-clipboard-list text-lg mb-0.5"></i>
        <span class="text-[9px] font-bold uppercase tracking-wider">Isi Biodata</span>
      </button>
      <button onclick="switchView('rekamJejak')" class="nav-item flex flex-col items-center justify-center text-gray-400 py-1 flex-1 transition-all">
        <i class="fas fa-trophy text-lg mb-0.5"></i>
        <span class="text-[9px] font-bold uppercase tracking-wider">Prestasi</span>
      </button>
    </nav>

  </div>

  <div id="custom-alert" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white rounded-2xl p-5 w-full max-w-xs text-center shadow-2xl">
      <h3 id="alert-title" class="text-sm font-black text-slate-800 mb-1"></h3>
      <p id="alert-msg" class="text-xs text-gray-500 mb-4 leading-relaxed"></p>
      <button onclick="closeAlert()" class="w-full py-2.5 bg-smpprimary text-white font-bold rounded-xl text-xs">Selesai</button>
    </div>
  </div>

  <script>
    // URL WEB APP GAS ANDA (?action=...)
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbyK6wmxSpZ3tEG0Rar3BlGjp7z-3ZPhTB6NvdmNkx8QlNKSoqafhsY0c1ZAcEMbPyW1VQ/exec";
  </script>
  <script src="TemplateViews.js"></script>
  <script src="Scripts.js"></script>
</body>
</html>
