<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Wali Kelas SMP - PWA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { biruMuda: '#e0f2fe', biruUtama: '#0284c7', kuningOsis: '#eab308', abuLatar: '#f3f4f6' } } } }
  </script>
</head>
<body class="bg-abuLatar text-gray-800 font-sans max-w-md mx-auto min-h-screen flex flex-col shadow-lg border-x border-gray-200 relative pb-20">

  <header class="bg-biruUtama text-white p-4 shadow-md sticky top-0 z-50 rounded-b-xl">
    <div class="flex justify-between items-center mb-3">
      <div class="flex items-center space-x-3">
        <img src="https://yanuar-moga.github.io/guruwali/assets/logo.png" alt="Logo" class="w-11 h-11 object-contain">
        <div>
          <h1 id="txtHeaderKelas" class="text-base font-bold">Kelas 9I</h1>
          <p class="text-xs text-biruMuda">Sistem Informasi Biodata</p>
        </div>
      </div>
      <span id="badgeStatusKelas" class="text-[10px] font-bold text-sky-200 px-2 py-0.5 bg-white/10 rounded">...</span>
    </div>
  </header>

  <main class="flex-1 p-4 overflow-y-auto">
    <div id="view-dashboard" class="space-y-4">
      <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-kuningOsis">
        <h2 class="font-bold text-sm">👋 Selamat Datang</h2>
        <p class="text-xs text-gray-500 mt-1">Gunakan menu di bawah untuk mengisi atau melihat biodata.</p>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <button onclick="bukaHalaman('view-form')" class="bg-white p-4 rounded-xl shadow-sm text-center">📝<br><span class="text-xs font-bold">Isi Biodata</span></button>
        <button onclick="bukaHalaman('view-biodata')" class="bg-white p-4 rounded-xl shadow-sm text-center">👤<br><span class="text-xs font-bold">Cek Biodata</span></button>
      </div>
    </div>

    <div id="view-form" class="hidden bg-white p-4 rounded-xl shadow-sm space-y-4">
      <form id="siswaForm" onsubmit="kirimDataSiswaGET(event)" class="text-xs space-y-4">
        <div id="step1" class="space-y-3">
          <h4 class="font-bold border-b pb-1">Biodata Diri</h4>
          <input type="number" id="noAbsen" placeholder="No Absen" required class="w-full p-2 border rounded-lg">
          <input type="text" id="kelas" value="Kelas 9I" readonly class="w-full p-2 border rounded-lg bg-gray-100">
          <input type="text" id="namaLengkap" placeholder="Nama Lengkap" required class="w-full p-2 border rounded-lg">
          <input type="text" id="namaPanggilan" placeholder="Nama Panggilan" class="w-full p-2 border rounded-lg">
          <select id="jk" class="w-full p-2 border rounded-lg"><option value="L">Laki-laki</option><option value="P">Perempuan</option></select>
          <input type="text" id="tempatLahir" placeholder="Tempat Lahir" class="w-full p-2 border rounded-lg">
          <input type="date" id="tglLahir" class="w-full p-2 border rounded-lg">
          <input type="text" id="alamat" placeholder="Alamat" class="w-full p-2 border rounded-lg">
          <input type="text" id="noWaSiswa" placeholder="No WA Siswa" class="w-full p-2 border rounded-lg">
          <input type="text" id="noWaOrtu" placeholder="No WA Ortu" class="w-full p-2 border rounded-lg">
        </div>
        
        <div id="step2" class="space-y-3">
          <h4 class="font-bold border-b pb-1">Minat & Akademik</h4>
          <input type="text" id="prestasiRingkas" placeholder="Prestasi" class="w-full p-2 border rounded-lg">
          <input type="text" id="hobi" placeholder="Hobi" class="w-full p-2 border rounded-lg">
          <input type="text" id="citaCita" placeholder="Cita-cita" class="w-full p-2 border rounded-lg">
          <input type="text" id="nis" placeholder="NIS" required class="w-full p-2 border rounded-lg">
          <input type="number" id="nisn" placeholder="NISN" class="w-full p-2 border rounded-lg">
          <input type="text" id="pelajaranSuka" placeholder="Pelajaran Disukai" class="w-full p-2 border rounded-lg">
          <input type="text" id="pelajaranTdkSuka" placeholder="Pelajaran Tidak Disukai" class="w-full p-2 border rounded-lg">
          <input type="text" id="ekskul" placeholder="Ekskul" class="w-full p-2 border rounded-lg">
          <input type="text" id="kegiatanMotivasi" placeholder="Kegiatan Motivasi" class="w-full p-2 border rounded-lg">
          <input type="text" id="caraBelajar" placeholder="Cara Belajar" class="w-full p-2 border rounded-lg">
        </div>

        <div id="step3" class="space-y-3">
          <h4 class="font-bold border-b pb-1">Data Keluarga</h4>
          <input type="text" id="namaAyah" placeholder="Nama Ayah" class="w-full p-2 border rounded-lg">
          <input type="text" id="pekerjaanAyah" placeholder="Pekerjaan Ayah" class="w-full p-2 border rounded-lg">
          <input type="text" id="pendidikanAyah" placeholder="Pendidikan Ayah" class="w-full p-2 border rounded-lg">
          <input type="text" id="namaIbu" placeholder="Nama Ibu" class="w-full p-2 border rounded-lg">
          <input type="text" id="pekerjaanIbu" placeholder="Pekerjaan Ibu" class="w-full p-2 border rounded-lg">
          <input type="text" id="pendidikanIbu" placeholder="Pendidikan Ibu" class="w-full p-2 border rounded-lg">
          <input type="text" id="topikOrtu" placeholder="Topik Ortu" class="w-full p-2 border rounded-lg">
          <input type="text" id="harapanOrtu" placeholder="Harapan Ortu" class="w-full p-2 border rounded-lg">
          <select id="punyaKip" class="w-full p-2 border rounded-lg"><option value="Tidak">Tidak Punya KIP</option><option value="Ya">Punya KIP</option></select>
          <select id="statusYatimPiatu" class="w-full p-2 border rounded-lg"><option value="Lengkap">Lengkap</option><option value="Yatim">Yatim</option><option value="Piatu">Piatu</option></select>
          <input type="text" id="riwayatSakit" placeholder="Riwayat Sakit" class="w-full p-2 border rounded-lg">
          <button type="submit" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold">Kirim Data</button>
        </div>
      </form>
    </div>

    <div id="view-biodata" class="hidden space-y-4">
      <div class="bg-white p-4 rounded-xl shadow-sm flex gap-2">
        <input type="text" id="searchNis" placeholder="Masukkan NIS..." class="flex-1 p-2 border rounded-lg text-sm">
        <button onclick="cariProfilSiswa()" class="bg-kuningOsis px-4 py-2 rounded-lg text-sm font-bold">Cari</button>
      </div>
      <div id="profilResult" class="hidden">
        <div id="dataContainer" class="bg-white p-4 rounded-xl shadow-sm text-sm space-y-2"></div>
      </div>
    </div>
  </main>

  <nav class="bg-white fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-around p-3 border-t">
    <button onclick="bukaHalaman('view-dashboard')">🏠 Beranda</button>
    <button onclick="bukaHalaman('view-form')">✍️ Isi</button>
    <button onclick="bukaHalaman('view-biodata')">👤 Data</button>
  </nav>

  <script>
    const URL_GAS = "https://script.google.com/macros/s/AKfycbxgMi_TQzbNjkSrlH9X2j_-aEO6I0jH8Nf81i2xvS5dKzC92VO8lkkOy_1lr01WHVkEMw/exec";

    function bukaHalaman(viewId) {
      document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
      document.getElementById(viewId).classList.remove('hidden');
    }

    // FUNGSI KIRIM DATA (Anti-Stuck)
    function kirimDataSiswaGET(e) {
      e.preventDefault();
      Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      const form = document.getElementById('siswaForm');
      let queryStr = `?aksi=simpanBiodata`;
      // Mengambil semua input yang ada di dalam form
      form.querySelectorAll('input, select').forEach(el => {
        if(el.id) queryStr += `&${el.id}=${encodeURIComponent(el.value)}`;
      });

      window.handleFormResponse = function(res) {
        Swal.fire('Sukses!', 'Data tersimpan.', 'success');
        form.reset();
        bukaHalaman('view-dashboard');
      };

      const script = document.createElement('script');
      script.src = URL_GAS + queryStr + `&callback=handleFormResponse`;
      document.body.appendChild(script);

      // Fail-safe: Paksa tutup loading setelah 2 detik
      setTimeout(() => { Swal.close(); }, 2000);
    }

    // FUNGSI CARI PROFIL (Tampil Semua Data)
    function cariProfilSiswa() {
      const nis = document.getElementById('searchNis').value;
      if(!nis) return Swal.fire('Error', 'Masukkan NIS', 'error');

      Swal.fire({ title: 'Mencari...', didOpen: () => Swal.showLoading() });

      window.handleGasResponse = function(res) {
        Swal.close();
        if(res.status === "success") {
          document.getElementById('profilResult').classList.remove('hidden');
          const container = document.getElementById('dataContainer');
          container.innerHTML = `<h3 class="font-bold border-b pb-2 text-biruUtama">Profil Lengkap</h3>`;
          // Menampilkan semua field dari data yang dikirim dari GAS
          for (let key in res.data) {
            container.innerHTML += `<div class="flex border-b py-1"><span class="w-1/3 text-gray-400 text-[10px] uppercase">${key}</span><span class="w-2/3 font-medium text-gray-800">${res.data[key]}</span></div>`;
          }
        } else {
          Swal.fire('Info', 'Data tidak ditemukan', 'info');
        }
      };

      const script = document.createElement('script');
      script.src = `${URL_GAS}?aksi=getRiwayatSiswa&nis=${nis}&callback=handleGasResponse`;
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
