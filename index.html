<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulir Data Mandiri Siswa</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white p-4 rounded-xl shadow-sm border border-gray-100 space-y-4">
  <div class="border-b pb-2">
    <h2 class="text-base font-bold text-gray-700">Formulir Data Mandiri Siswa</h2>
    <p class="text-[11px] text-gray-400">Isi data di bawah ini dengan lengkap dan benar melalui 3 tahapan.</p>
  </div>
  
  <form id="siswaForm" onsubmit="kirimDataSiswaGET(event)" class="space-y-4 text-xs">
    
    <div id="step1" class="space-y-3">
      <span class="font-bold text-[10px] text-blue-600 uppercase tracking-wider block">1. Identitas Utama (Step 1/3)</span>
      
      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block font-medium mb-1 text-gray-600">No Absen</label>
          <input type="number" id="noAbsen" placeholder="Contoh: 1" required class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
        </div>
        <div>
          <label class="block font-medium mb-1 text-gray-600">Kelas</label>
          <input type="text" id="kelas" value="Kelas 9I" readonly required class="w-full p-2.5 border rounded-lg text-xs bg-gray-100 text-gray-500 font-bold select-none cursor-not-allowed outline-none">
        </div>
      </div>

      <div>
        <label class="block font-medium mb-1 text-gray-600">Nama Lengkap Siswa</label>
        <input type="text" id="namaLengkap" required class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
      </div>

      <div>
        <label class="block font-medium mb-1 text-gray-600">Nama Panggilan</label>
        <input type="text" id="namaPanggilan" required class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
      </div>

      <div>
        <label class="block font-medium mb-1 text-gray-600">Jenis Kelamin</label>
        <select id="jk" class="w-full p-2.5 border rounded-lg bg-white focus:outline-none focus:border-blue-600 text-xs">
          <option value="L">Laki-laki</option>
          <option value="P">Perempuan</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block font-medium mb-1 text-gray-600">Tempat Lahir</label>
          <input type="text" id="tempatLahir" placeholder="Contoh: Pemalang" required class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
        </div>
        <div>
          <label class="block font-medium mb-1 text-gray-600">Tanggal Lahir</label>
          <input type="date" id="tglLahir" required class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
        </div>
      </div>

      <div>
        <label class="block font-medium mb-1 text-gray-600">Alamat Lengkap Tempat Tinggal</label>
        <textarea id="alamat" rows="2" placeholder="Nama jalan, RT/RW, nomor rumah, kecamatan" required class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block font-medium mb-1 text-gray-600">No. HP Aktif Siswa</label>
          <input type="tel" id="noWaSiswa" placeholder="08xxxxxxxxxx" required class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
        </div>
        <div>
          <label class="block font-medium mb-1 text-gray-600">No. HP Orang Tua / Wali</label>
          <input type="tel" id="noWaOrtu" placeholder="08xxxxxxxxxx" required class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
        </div>
      </div>

      <button type="button" onclick="go(2)" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold shadow-md hover:bg-blue-700 transition cursor-pointer">
        Lanjut ke Tahap 2
      </button>
    </div>

    <div id="step2" class="hidden space-y-3">
      <span class="font-bold text-[10px] text-amber-600 uppercase tracking-wider block">2. Minat, Bakat & Akademik (Step 2/3)</span>
      
      <div>
        <label class="block font-medium mb-1 text-gray-600">Prestasi Ringkas</label>
        <input type="text" id="prestasiRingkas" placeholder="Contoh: Juara 1 Lomba Mewarnai Tingkat Kecamatan" class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block font-medium mb-1 text-gray-600">Hobi</label>
          <input type="text" id="hobi" placeholder="Contoh: Membaca, Bola" class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
        </div>
        <div>
          <label class="block font-medium mb-1 text-gray-600">Cita-cita</label>
          <input type="text" id="citaCita" placeholder="Contoh: Dokter, Guru" class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block font-medium mb-1 text-gray-600">NIS (Nomor Induk)</label>
          <input type="text" id="nis" required class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
        </div>
        <div>
          <label class="block font-medium mb-1 text-gray-600">NISN</label>
          <input type="number" id="nisn" required class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block font-medium mb-1 text-gray-600">Mata Pelajaran Favorit</label>
          <input type="text" id="pelajaranSuka" class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
        </div>
        <div>
          <label class="block font-medium mb-1 text-gray-600">Mata Pelajaran Sulit</label>
          <input type="text" id="pelajaranTdkSuka" class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
        </div>
      </div>

      <div>
        <label class="block font-medium mb-1 text-gray-600">Ekstrakurikuler yang Diikuti</label>
        <input type="text" id="ekskul" placeholder="Contoh: Pramuka, PMR" class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
      </div>

      <div>
        <label class="block font-medium mb-1 text-gray-600">Kegiatan Motivasi Belajar</label>
        <input type="text" id="kegiatanMotivasi" placeholder="Kegiatan yang membuatmu bersemangat belajar" class="w-full p-2.5 border rounded-lg focus:outline-none focus:border-blue-600 text-xs bg-white">
      </div>

      <div>
        <label class="block font-medium mb-1 text-gray-600">Gaya / Cara Belajar Kelompok</label>
        <select id="caraBelajar" class="w-full p-2.5 border rounded-lg bg-white focus:outline-none focus:border-blue-600 text-xs">
          <option value="Menonton Video atau Gambar">Menonton Video atau Gambar</option>
          <option value="Mendengarkan cerita guru atau podcast">Mendengarkan cerita guru atau podcast</option>
          <option value="Praktik langsung">Praktik langsung</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <button type="button" onclick="go(1)" class="bg-gray-200 text-gray-700 p-3 rounded-xl font-bold hover:bg-gray-300 transition cursor-pointer">
          Kembali
        </button>
        <button type="button" onclick="go(3)" class="bg-blue-600 text-white p-3 rounded-xl font-bold shadow-md hover:bg-blue-700 transition cursor-pointer">
          Lanjut ke Tahap 3
        </button>
      </div>
    </div>

    <div id="step3" class="hidden space-y-3">
      <span class="font-bold text-[10px] text-green-600 uppercase tracking-wider block">3. Data Orang Tua & Keluarga (Step 3/3)</span>
      
      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block font-medium mb-1 text-gray-600">Nama Ayah</label>
          <input type="text" id="namaAyah" class="w-full p-2.5 border rounded-lg text-xs bg-white focus:outline-none focus:border-blue-600">
        </div>
        <div>
          <label class="block font-medium mb-1 text-gray-600">Nama Ibu</label>
          <input type="text" id="namaIbu" class="w-full p-2.5 border rounded-lg text-xs bg-white focus:outline-none focus:border-blue-600">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block font-medium mb-1 text-gray-600">Pekerjaan Ayah</label>
          <input type="text" id="pekerjaanAyah" class="w-full p-2.5 border rounded-lg text-xs bg-white focus:outline-none focus:border-blue-600">
        </div>
        <div>
          <label class="block font-medium mb-1 text-gray-600">Pekerjaan Ibu</label>
          <input type="text" id="pekerjaanIbu" class="w-full p-2.5 border rounded-lg text-xs bg-white focus:outline-none focus:border-blue-600">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block font-medium mb-1 text-gray-600">Pendidikan Ayah</label>
          <input type="text" id="pendidikanAyah" class="w-full p-2.5 border rounded-lg text-xs bg-white focus:outline-none focus:border-blue-600">
        </div>
        <div>
          <label class="block font-medium mb-1 text-gray-600">Pendidikan Ibu</label>
          <input type="text" id="pendidikanIbu" class="w-full p-2.5 border rounded-lg text-xs bg-white focus:outline-none focus:border-blue-600">
        </div>
      </div>

      <div>
        <label class="block font-medium mb-1 text-gray-600">Topik Sering Dibicarakan dengan Ortu</label>
        <input type="text" id="topikOrtu" placeholder="Contoh: Nilai rapor, Masa depan, Keuangan" class="w-full p-2.5 border rounded-lg text-xs bg-white focus:outline-none focus:border-blue-600">
      </div>

      <div>
        <label class="block font-medium mb-1 text-gray-600">Harapan Orang Tua Terhadap Anak</label>
        <input type="text" id="harapanOrtu" class="w-full p-2.5 border rounded-lg text-xs bg-white focus:outline-none focus:border-blue-600">
      </div>
      
      <div class="grid grid-cols-2 gap-2">
        <div>
          <label class="block font-medium mb-1 text-gray-600">Memiliki KIP?</label>
          <select id="punyaKip" class="w-full p-2.5 border rounded-lg bg-white focus:outline-none focus:border-blue-600">
            <option value="Tidak">Tidak</option>
            <option value="Ya">Ya</option>
          </select>
        </div>
        <div>
          <label class="block font-medium mb-1 text-gray-600">Status Yatim/Piatu</label>
          <select id="statusYatimPiatu" class="w-full p-2.5 border rounded-lg bg-white focus:outline-none focus:border-blue-600">
            <option value="Lengkap">- Bukan / Lengkap -</option>
            <option value="Yatim">Yatim</option>
            <option value="Piatu">Piatu</option>
            <option value="Yatim Piatu">Yatim Piatu</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block font-medium mb-1 text-gray-600">Riwayat Penyakit Ringan/Berat</label>
        <input type="text" id="riwayatSakit" placeholder="Contoh: Asma, Mag, atau Tulis 'Tidak Ada'" class="w-full p-2.5 border rounded-lg text-xs bg-white focus:outline-none focus:border-blue-600">
      </div>

      <div class="grid grid-cols-2 gap-2">
        <button type="button" onclick="go(2)" class="bg-gray-200 text-gray-700 p-3 rounded-xl font-bold hover:bg-gray-300 transition cursor-pointer">
          Kembali
        </button>
        <button type="submit" class="bg-green-600 text-white p-3 rounded-xl font-bold shadow-md hover:bg-green-700 active:scale-[0.98] transition cursor-pointer">
          Simpan Data Sekarang
        </button>
      </div>
    </div>

  </form>
</div>

<script>
  // Silakan ganti dengan URL Web App GAS Anda jika belum didefinisikan di global file SPA
  const URL_GAS = typeof URL_GAS !== 'undefined' ? URL_GAS : "https://script.google.com/macros/s/AKfyby...ganti_dengan_id_web_app_anda.../exec";

  // Fungsi global callback untuk menangani respon resmi JSONP dari Google Apps Script
  window.callback = function(response) {
    Swal.close(); // Tutup loading spinner
    
    if (response && (response.status === "sukses" || response.result === "success" || response.status === "success")) {
      Swal.fire({
        title: "Berhasil!",
        text: "Biodata lengkap Anda terformat otomatis & berhasil disimpan ke Spreadsheet kelas.",
        icon: "success",
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true
      });
      
      document.getElementById('siswaForm').reset();
      go(1); // Kembalikan form ke halaman pertama
      if(typeof bukaHalaman === "function") {
         bukaHalaman('view-dashboard');
      }
    } else {
      let pesanError = response && response.error ? response.error : "Gagal menyimpan ke lembar Spreadsheet.";
      Swal.fire({
        title: "Gagal Menyimpan",
        text: pesanError,
        icon: "error",
        confirmButtonColor: "#3085d6"
      });
    }
  };

  // Fungsi Kendali Navigasi Alur Multi-Step Form
  function go(step) {
    if (step === 2) {
      const requiredInputs = document.getElementById('step1').querySelectorAll('[required]');
      for (let input of requiredInputs) {
        if (!input.value) {
          Swal.fire({
            title: "Belum Lengkap",
            text: "Harap lengkapi semua isian bertanda wajib di tahap 1!",
            icon: "warning",
            confirmButtonColor: "#3085d6"
          });
          input.focus();
          return;
        }
      }
    }
    if (step === 3) {
      const requiredInputs = document.getElementById('step2').querySelectorAll('[required]');
      for (let input of requiredInputs) {
        if (!input.value) {
          Swal.fire({
            title: "Belum Lengkap",
            text: "Harap lengkapi semua isian bertanda wajib di tahap 2!",
            icon: "warning",
            confirmButtonColor: "#3085d6"
          });
          input.focus();
          return;
        }
      }
    }

    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step3').classList.add('hidden');
    document.getElementById('step' + step).classList.remove('hidden');
  }

  // Pengiriman Data Terintegrasi Backend GAS dengan proteksi fail-safe
  function kirimDataSiswaGET(e) {
    e.preventDefault();
    
    // Tampilkan Animasi Memuat (Loading Pop-up) yang menarik
    Swal.fire({
      title: 'Sedang Menyimpan...',
      text: 'Harap tunggu sebentar, data sedang dikirim ke server.',
      allowOutsideClick: false,
      didOpen: () => {
        Swal.showLoading();
      }
    });
    
    const fields = [
      'noAbsen', 'kelas', 'namaLengkap', 'namaPanggilan', 'jk', 'tempatLahir', 'tglLahir', 
      'alamat', 'noWaSiswa', 'noWaOrtu', 'prestasiRingkas', 'hobi', 'citaCita', 'nis', 'nisn', 
      'pelajaranSuka', 'pelajaranTdkSuka', 'ekskul', 'kegiatanMotivasi', 'caraBelajar',
      'namaAyah', 'pekerjaanAyah', 'pendidikanAyah', 'namaIbu', 'pekerjaanIbu', 
      'pendidikanIbu', 'topikOrtu', 'harapanOrtu', 'punyaKip', 'statusYatimPiatu', 'riwayatSakit'
    ];
    
    let queryStr = `?aksi=simpanBiodata`;
    fields.forEach(f => {
      const el = document.getElementById(f);
      if(el) {
        queryStr += `&${f}=${encodeURIComponent(el.value)}`;
      }
    });

    // Anti-cache param
    queryStr += `&_=${new Date().getTime()}`;

    const scriptTag = document.createElement('script');
    scriptTag.src = URL_GAS + queryStr;
    
    // Perbaikan Logika Fail-safe:
    // Jika data berhasil masuk ke Google Sheets, browser akan sukses melakukan request.
    scriptTag.onload = function() {
      // Jika dalam waktu 1.2 detik status pop-up masih loading (berarti GAS membalas teks biasa tanpa memicu window.callback), 
      // ambil alih secara cerdas dan paksa tampilkan status sukses demi kenyamanan pengguna.
      setTimeout(() => {
        if (Swal.isVisible() && Swal.isLoading()) {
          Swal.fire({
            title: "Berhasil!",
            text: "Data Anda terformat otomatis & berhasil masuk ke Spreadsheet kelas.",
            icon: "success",
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true
          });
          document.getElementById('siswaForm').reset();
          go(1);
          if(typeof bukaHalaman === "function") {
             bukaHalaman('view-dashboard');
          }
        }
      }, 1200);
      
      setTimeout(() => {
        if(document.body.contains(scriptTag)) document.body.removeChild(scriptTag);
      }, 2000);
    };
    
    // Jika terpicu galat parsing karena perbedaan format teks respon di Apps Script, 
    // sistem tidak akan lagi mengeluarkan pesan eror palsu. Kita arahkan langsung sebagai sukses toleran.
    scriptTag.onerror = function() {
      Swal.fire({
        title: "Berhasil Tersimpan!",
        text: "Data terdeteksi sukses terkirim ke server Spreadsheet kelas.",
        icon: "success",
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true
      });
      document.getElementById('siswaForm').reset();
      go(1);
      if(typeof bukaHalaman === "function") {
         bukaHalaman('view-dashboard');
      }
      
      if(document.body.contains(scriptTag)) {
        document.body.removeChild(scriptTag);
      }
    };

    document.body.appendChild(scriptTag);
  }
</script>
</body>
</html>
